server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Permite subidas grandes (plantillas Demo, documentos, RAG, media). Sin esto,
    # el límite por defecto de nginx (1 MB) rechaza el archivo con una página HTML
    # 413 → el frontend recibe "<html>..." y falla al parsear JSON.
    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://avi-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass http://avi-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
